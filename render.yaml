services:
  - type: web
    name: docanalyst-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: UPSTASH_VECTOR_REST_URL
        sync: false
      - key: UPSTASH_VECTOR_REST_TOKEN
        sync: false
      - key: DEFAULT_CSV_PATH
        value: /var/data/sell_prices.csv

  - type: web
    name: docanalyst-ui
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run ui.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: DEFAULT_API_BASE_URL
        value: https://docanalyst-api.onrender.com
      - key: DEFAULT_CSV_PATH
        value: /var/data/sell_prices.csv
